<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevTrace - Git Activity Tracker</title>
  <style>
    html,
    body {
      margin: 0;
      background: #ffffff;
      color: #e2e8f0;
    }

    body.preload main {
      opacity: 0;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-Dhc40dpH.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CPEIvg3-.css">
</head>

<body class="preload">
  <main
    class="relative z-10 mx-auto grid h-screen w-[96vw] max-w-[1380px] grid-cols-1 grid-rows-[auto_auto_1fr] gap-3 p-3 xl:grid-cols-[430px_minmax(0,1fr)] xl:grid-rows-[auto_minmax(0,1fr)] xl:[grid-template-areas:'hero_hero''search_results']">
    <header class="panel-card grid gap-2 p-4 xl:[grid-area:hero]">
      <h1 class="m-0 text-2xl font-bold tracking-tight">DevTrace</h1>
      <p class="m-0 text-sm text-slate-400">Track, filter, and summarize commit activity using repository,
        username/author, personal access token, date or date range, and selectable summary style.
      </p>
    </header>

    <section class="panel-card min-h-0 overflow-auto p-4 xl:[grid-area:search] xl:self-start scroll-thin">
      <h2 class="mb-3 mt-0 text-base font-semibold">Search Activity</h2>

      <form id="activityForm" class="grid gap-3">
        <label class="field-label">
          Repository
          <input id="repository" name="repository" type="text" class="field-input"
            placeholder="owner/repo or https://github.com/owner/repo (optional)" />
        </label>

        <label class="field-label">
          Username or Author
          <input id="authorQuery" name="authorQuery" type="text" class="field-input"
            placeholder="ralph / RalphSpace / ralph@example.com" required />
        </label>

        <label class="field-label">
          Personal Access Token
          <input id="token" name="token" type="password" class="field-input" autocomplete="off"
            placeholder="Optional token (blank = public only)" />
        </label>

        <label class="field-label">
          Date Filter
          <select id="dateFilterMode" name="dateFilterMode" class="field-input">
            <option value="specific">Specific date</option>
            <option value="range">Date range</option>
          </select>
        </label>

        <div data-date-block="specific" class="rounded-xl border border-[#30363d] bg-[#0f141b] p-3">
          <label class="field-label">
            Specific Date
            <input id="specificDate" name="specificDate" type="date" class="field-input" required />
          </label>
        </div>

        <div data-date-block="range"
          class="grid grid-cols-1 gap-3 rounded-xl border border-[#30363d] bg-[#0f141b] p-3 md:grid-cols-2" hidden>
          <label class="field-label">
            Start Date
            <input id="rangeStart" name="rangeStart" type="date" class="field-input" />
          </label>

          <label class="field-label">
            End Date
            <input id="rangeEnd" name="rangeEnd" type="date" class="field-input" />
          </label>
        </div>

        <label class="field-label">
          Summary Style
          <select id="summaryStyle" name="summaryStyle" class="field-input">
            <option value="short">Short</option>
            <option value="professional" selected>Professional</option>
            <option value="detailed">Detailed</option>
            <option value="standup">Standup-style</option>
          </select>
        </label>

        <button type="submit" class="btn-primary w-full">Fetch Activity</button>
      </form>
    </section>

    <section class="panel-card grid min-h-0 grid-rows-[auto_auto_auto_minmax(0,1fr)] p-4 xl:[grid-area:results]">
      <h2 class="m-0 text-base font-semibold">Results</h2>
      <p id="status" class="mt-2 text-sm text-slate-400"></p>
      <div id="warnings" class="mt-2 hidden rounded-xl border border-amber-700 bg-amber-950/50 p-3"></div>
      <div id="output" class="scroll-thin mt-3 grid min-h-0 gap-3 overflow-auto pr-1"></div>
    </section>
  </main>

</body>

</html>
